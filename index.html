<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=D, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="Styles/header.css">
    <link rel="stylesheet" href="Styles/banner.css">
    <link rel="stylesheet" href="Styles/filtros.css">
    <link rel="stylesheet" href="Styles/dinosauros-card.css">
    <title>DinoPege</title>
</head>

<body>
    <header id="naveBar">
    </header>
    <main>
        <section id="inicio">
            <div class="banner">
                <div class="conteudo-b">
                    <div class="overlay">
                        <h2>Explore o incrivel mundo dos <span>Dinossauros</span></h2>
                        <p>Descubra as informaçoes cientificas, locais de fosseeis periodos geologicos e muito mais
                            sobre as
                            criatuars que dominaram a terra.</p>
                    </div>
                    <div class="conteiner-infos-dados">
                        <div class="infos">
                            <div class="icon">
                                <img src="./imagens/icons-pegada.png" alt="Icone de Dinossauro" width="30" height="30">
                            </div>
                            <div class="dados">
                                <h3>+1.200</h3>
                                <p>Especies</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <section id="filtros">
            <div class="title">
                <h2>Principais Dinossauros</h2>
                <p>Conheça alguns dos dinossauros mais incriveis que ja existiram.</p>
            </div>
            <div class="filtros">

                <div class="filtro">
                    <select id="periodo">
                        <option>Período</option>
                        <option>Jurássico</option>
                        <option>Cretáceo</option>
                        <option>Triássico</option>
                    </select>
                </div>

                <div class="filtro">
                    <select id="dieta">
                        <option>Dieta</option>
                        <option>Carnívoro</option>
                        <option>Herbívoro</option>
                        <option>Onívoro</option>
                    </select>
                </div>

                <div class="filtro">
                    <select id="ordem">
                        <option>Ordem</option>
                        <option>Terópodes</option>
                        <option>Saurópodes</option>
                        <option>Ornitópodes</option>
                    </select>
                </div>

                <div class="filtro">
                    <select id="continente">
                        <option>Continente</option>
                        <option>América</option>
                        <option>Europa</option>
                        <option>Ásia</option>
                    </select>
                </div>

            </div>
        </section>
        <section id="dinosauros-cards">
            <!-- <div class="dinosauro">
                <div class="overlay-card">
                    <h3>Tyrannosaurus Rex</h3>
                    <h4>Carnívoro</h4>
                    <p> <i class="icone" data-lucide="calendar"></i>Cretáceo</p>
                    <p> <i class="icone" data-lucide="map-pin"></i>América do Norte</p>
                    <p> <i class="icone" data-lucide="ruler"></i>1-2 metros</p>
                    <hr>
                    <button class="buton-vermais">Ver Detalhes</button>
                </div>
            </div> -->
        </section>
    </main>

</body>
